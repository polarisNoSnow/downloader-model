name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed --name "HFDownloader-${{ github.ref_name }}-${{ matrix.os }}" app.py
      
      - name: Set executable permissions (Unix)
        if: runner.os != 'Windows'
        run: chmod +x dist/*
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HFDownloader-${{ github.ref_name }}-${{ matrix.os }}
          path: dist/*
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir release
          find artifacts -type f -name "HFDownloader*" -exec cp {} release/ \;
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
